# 구역(zone)별 Chat 모델 ID (OpenAI Chat Completions / LangChain ChatOpenAI).
#
# 비용 최적화 프로필: 스텝 상한은 exploration_limits.yaml 만 건드린다. 여기서는 모델만 낮춤.
# - nano: 짧은 출력·분류·라우팅형 (호출당 토큰·단가 모두 유리)
# - mini: 구조화 JSON·긴 컨텍스트·브라우저 스텝 결정 (nano 보다 안정, 플래그십보다 저렴)
#
# 품질이 부족하면 해당 구역만 mini→플래그십으로 올리면 된다.
# 계정에 5.4 계열이 없으면 default 를 사용 가능한 모델로 통일한다.

default: gpt-5.4-mini

# 페이지 타입 한 단어 분류
page_classifier: gpt-5.4-nano

# DOM/JSON-LD·셀렉터 추출 (정확도 필요 → mini)
structure_analyzer: gpt-5.4-mini

# GTM 설계안 JSON (규칙·스키마 준수 → mini)
planning: gpt-5.4-mini

# 탐색 큐·이벤트 분류 (상대적으로 짧은 JSON → nano)
journey_planner: gpt-5.4-nano

# Navigator: 스텝당 LLM 호출이 많음 → 전부 mini 로 통일 (스텝 수는 YAML 스텝 상한 유지)
navigator: gpt-5.4-mini
cart_addition_navigator: gpt-5.4-mini
begin_checkout_navigator: gpt-5.4-mini
